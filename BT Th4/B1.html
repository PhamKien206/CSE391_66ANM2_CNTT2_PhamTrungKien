<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Điểm Sinh Viên</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .input-section {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }

        input {
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
            width: 200px;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        button {
            padding: 10px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            align-self: flex-end;
        }

        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .table-section {
            margin-bottom: 25px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        thead {
            background: #667eea;
            color: white;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        tbody tr:hover {
            background: #f9f9f9;
        }

        tbody tr.low-score {
            background-color: #fffb00;
        }

        .delete-btn {
            background: #e74c3c;
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 4px;
        }

        .delete-btn:hover {
            background: #c0392b;
        }

        .empty-message {
            text-align: center;
            padding: 40px;
            color: #999;
            font-style: italic;
        }

        .stats {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
            font-size: 16px;
            color: #333;
        }

        .stats strong {
            color: #667eea;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> Quản Lý Điểm Sinh Viên</h1>

        <div class="input-section">
            <div class="input-group">
                <label for="nameInput">Họ tên:</label>
                <input type="text" id="nameInput" placeholder="Nhập họ tên">
            </div>
            <div class="input-group">
                <label for="scoreInput">Điểm (0-10):</label>
                <input type="number" id="scoreInput" placeholder="0" min="0" max="10">
            </div>
            <button id="addBtn">Thêm</button>
        </div>

        <div class="table-section">
            <table>
                <thead>
                    <tr>
                        <th>STT</th>
                        <th>Họ tên</th>
                        <th>Điểm</th>
                        <th>Xếp loại</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="tbody">
                    <tr class="empty-message">
                        <td colspan="5">Chưa có dữ liệu</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="stats">
            <p>Tổng số sinh viên: <strong id="totalStudents">0</strong></p>
            <p>Điểm trung bình: <strong id="avgScore">0.00</strong></p>
        </div>
    </div>

    <script>
        // Mảng lưu danh sách sinh viên
        let students = [];

        // Lấy các phần tử DOM
        const nameInput = document.getElementById('nameInput');
        const scoreInput = document.getElementById('scoreInput');
        const addBtn = document.getElementById('addBtn');
        const tbody = document.getElementById('tbody');
        const totalStudentsSpan = document.getElementById('totalStudents');
        const avgScoreSpan = document.getElementById('avgScore');

        // Hàm xác định xếp loại
        function getClassification(score) {
            if (score >= 8.5) return 'Giỏi';
            if (score >= 7.0) return 'Khá';
            if (score >= 5.0) return 'Trung bình';
            return 'Yếu';
        }

        // Hàm thêm sinh viên
        function addStudent() {
            const name = nameInput.value.trim();
            const score = parseFloat(scoreInput.value);

            // Kiểm tra dữ liệu
            if (!name) {
                alert('Vui lòng nhập họ tên!');
                nameInput.focus();
                return;
            }

            if (isNaN(score) || score < 0 || score > 10) {
                alert('Điểm phải là số từ 0 đến 10!');
                scoreInput.focus();
                return;
            }

            // Thêm vào mảng
            students.push({
                name: name,
                score: score
            });

            // Xóa trắng input và đưa focus về Họ tên
            nameInput.value = '';
            scoreInput.value = '';
            nameInput.focus();

            // Vẽ lại bảng
            renderTable();
        }

        // Hàm xóa sinh viên
        function deleteStudent(index) {
            if (confirm('Bạn chắc chắn muốn xóa sinh viên này?')) {
                students.splice(index, 1);
                renderTable();
            }
        }

        // Hàm vẽ lại bảng
        function renderTable() {
            tbody.innerHTML = '';

            if (students.length === 0) {
                tbody.innerHTML = '<tr class="empty-message"><td colspan="5">Chưa có dữ liệu</td></tr>';
                updateStats();
                return;
            }

            students.forEach((student, index) => {
                const classification = getClassification(student.score);
                const row = document.createElement('tr');

                // Tô màu nền vàng nếu điểm < 5.0
                if (student.score < 5.0) {
                    row.classList.add('low-score');
                }

                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${student.name}</td>
                    <td>${student.score.toFixed(1)}</td>
                    <td>${classification}</td>
                    <td>
                        <button class="delete-btn" data-index="${index}">Xóa</button>
                    </td>
                `;

                tbody.appendChild(row);
            });

            updateStats();
        }

        // Hàm cập nhật thống kê
        function updateStats() {
            totalStudentsSpan.textContent = students.length;

            if (students.length === 0) {
                avgScoreSpan.textContent = '0.00';
            } else {
                const totalScore = students.reduce((sum, student) => sum + student.score, 0);
                const avgScore = totalScore / students.length;
                avgScoreSpan.textContent = avgScore.toFixed(2);
            }
        }

        // Event: Bấm nút Thêm
        addBtn.addEventListener('click', addStudent);

        // Event: Nhấn Enter ở ô Điểm
        scoreInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addStudent();
            }
        });

        // Event Delegation: Xóa sinh viên
        tbody.addEventListener('click', (e) => {
            if (e.target.classList.contains('delete-btn')) {
                const index = parseInt(e.target.getAttribute('data-index'));
                deleteStudent(index);
            }
        });
    </script>
</body>
</html>
