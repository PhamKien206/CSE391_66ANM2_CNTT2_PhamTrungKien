<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Điểm Sinh Viên - Nâng cấp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .input-section {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }

        input, select {
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
            width: 200px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        button {
            padding: 10px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            align-self: flex-end;
        }

        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        /* CSS cho phần filter/search */
        .filter-section {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 5px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filter-group label {
            font-size: 13px;
        }

        .filter-group input,
        .filter-group select {
            width: 200px;
        }

        .sortable {
            cursor: pointer;
            user-select: none;
            position: relative;
        }

        .sortable:hover {
            background: #e8e8ff;
        }

        .sort-indicator {
            margin-left: 8px;
            font-size: 12px;
            color: #667eea;
        }

        .table-section {
            margin-bottom: 25px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        thead {
            background: #667eea;
            color: white;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        tbody tr:hover {
            background: #f9f9f9;
        }

        tbody tr.low-score {
            background-color: #ffd859;
        }

        .delete-btn {
            background: #e74c3c;
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 4px;
        }

        .delete-btn:hover {
            background: #c0392b;
        }

        .empty-message {
            text-align: center;
            padding: 40px;
            color: #999;
            font-style: italic;
        }

        .stats {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
            font-size: 16px;
            color: #333;
        }

        .stats strong {
            color: #667eea;
            font-size: 18px;
        }

        .result-count {
            font-size: 13px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> Quản Lý Điểm Sinh Viên (Nâng cấp)</h1>

        <!-- Phần thêm sinh viên -->
        <div class="input-section">
            <div class="input-group">
                <label for="nameInput">Họ tên:</label>
                <input type="text" id="nameInput" placeholder="Nhập họ tên">
            </div>
            <div class="input-group">
                <label for="scoreInput">Điểm (0-10):</label>
                <input type="number" id="scoreInput" placeholder="0" min="0" max="10">
            </div>
            <button id="addBtn">Thêm</button>
        </div>

        <!-- Phần tìm kiếm và lọc -->
        <div class="filter-section">
            <div class="filter-group">
                <label for="searchInput">🔍 Tìm kiếm:</label>
                <input type="text" id="searchInput" placeholder="Nhập tên để tìm kiếm...">
            </div>
            <div class="filter-group">
                <label for="filterSelect">📌 Lọc xếp loại:</label>
                <select id="filterSelect">
                    <option value="">Tất cả</option>
                    <option value="Giỏi">Giỏi</option>
                    <option value="Khá">Khá</option>
                    <option value="Trung bình">Trung bình</option>
                    <option value="Yếu">Yếu</option>
                </select>
            </div>
            <div class="filter-group" style="justify-content: flex-end;">
                <span class="result-count">Kết quả: <strong id="resultCount">0</strong></span>
            </div>
        </div>

        <!-- Bảng hiển thị -->
        <div class="table-section">
            <table>
                <thead>
                    <tr>
                        <th>STT</th>
                        <th>Họ tên</th>
                        <th class="sortable" id="scoreHeader">Điểm <span class="sort-indicator"></span></th>
                        <th>Xếp loại</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="tbody">
                    <tr class="empty-message">
                        <td colspan="5">Chưa có dữ liệu</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Thống kê tổng -->
        <div class="stats">
            <p>Tổng số sinh viên: <strong id="totalStudents">0</strong></p>
            <p>Điểm trung bình: <strong id="avgScore">0.00</strong></p>
        </div>
    </div>

    <script>
        // ===== BIẾN TOÀN CỤC =====
        let students = [];           // Mảng gốc
        let filteredStudents = [];   // Mảng sau khi lọc/tìm kiếm/sắp xếp
        let sortConfig = {
            field: 'score',
            direction: 'asc'        // 'asc' (tăng) hoặc 'desc' (giảm)
        };

        // ===== LẤY PHẦN TỬ DOM =====
        const nameInput = document.getElementById('nameInput');
        const scoreInput = document.getElementById('scoreInput');
        const addBtn = document.getElementById('addBtn');
        const tbody = document.getElementById('tbody');
        const totalStudentsSpan = document.getElementById('totalStudents');
        const avgScoreSpan = document.getElementById('avgScore');
        
        // Phần tử mới cho tìm kiếm/lọc
        const searchInput = document.getElementById('searchInput');
        const filterSelect = document.getElementById('filterSelect');
        const resultCountSpan = document.getElementById('resultCount');
        const scoreHeader = document.getElementById('scoreHeader');

        // ===== HÀM TIỆN ÍCH =====
        function getClassification(score) {
            if (score >= 8.5) return 'Giỏi';
            if (score >= 7.0) return 'Khá';
            if (score >= 5.0) return 'Trung bình';
            return 'Yếu';
        }

        // ===== HÀM THÊM SINH VIÊN =====
        function addStudent() {
            const name = nameInput.value.trim();
            const score = parseFloat(scoreInput.value);

            if (!name) {
                alert('Vui lòng nhập họ tên!');
                nameInput.focus();
                return;
            }

            if (isNaN(score) || score < 0 || score > 10) {
                alert('Điểm phải là số từ 0 đến 10!');
                scoreInput.focus();
                return;
            }

            students.push({
                name: name,
                score: score
            });

            nameInput.value = '';
            scoreInput.value = '';
            nameInput.focus();

            applyFilters();  // ← Gọi lại để cập nhật bảng
        }

        // ===== HÀM XÓA SINH VIÊN =====
        function deleteStudent(index) {
            if (confirm('Bạn chắc chắn muốn xóa sinh viên này?')) {
                // index ở đây là vị trí trong filteredStudents, không phải students
                // Nên ta phải tìm object trong students rồi xóa
                const studentToDelete = filteredStudents[index];
                const originalIndex = students.indexOf(studentToDelete);
                
                if (originalIndex > -1) {
                    students.splice(originalIndex, 1);
                }
                
                applyFilters();  // ← Cập nhật bảng
            }
        }

        // ===== HÀM ÁP DỤNG BỘ LỌC/TÌM KIẾM/SẮP XẾP =====
        function applyFilters() {
            // Bước 1: Lấy các giá trị từ input/select
            const searchKeyword = searchInput.value.toLowerCase();
            const selectedClassification = filterSelect.value;

            // Bước 2: Filter (tìm kiếm + lọc xếp loại)
            filteredStudents = students.filter(student => {
                // Điều kiện tìm kiếm: tên chứa keyword
                const matchesSearch = student.name.toLowerCase().includes(searchKeyword);
                
                // Điều kiện lọc xếp loại
                const classification = getClassification(student.score);
                const matchesClassification = selectedClassification === '' || classification === selectedClassification;

                // Cả 2 điều kiện phải đúng
                return matchesSearch && matchesClassification;
            });

            // Bước 3: Sắp xếp
            filteredStudents.sort((a, b) => {
                let compareValue = 0;
                
                if (sortConfig.field === 'score') {
                    compareValue = a.score - b.score;
                }

                // Nếu chiều sắp xếp là giảm dần, đảo ngược
                if (sortConfig.direction === 'desc') {
                    compareValue = -compareValue;
                }

                return compareValue;
            });

            // Bước 4: Vẽ lại bảng
            renderTable();
            updateStats();
            updateSortIndicator();
        }

        // ===== HÀM CẬP NHẬT CHỈ SỐ SẮP XẾP =====
        function updateSortIndicator() {
            const indicator = scoreHeader.querySelector('.sort-indicator');
            
            if (sortConfig.direction === 'asc') {
                indicator.textContent = '▲';
            } else {
                indicator.textContent = '▼';
            }
        }

        // ===== HÀM VẼ LẠI BẢNG =====
        function renderTable() {
            tbody.innerHTML = '';

            // Hiển thị số lượng kết quả
            resultCountSpan.textContent = filteredStudents.length;

            if (filteredStudents.length === 0) {
                tbody.innerHTML = '<tr class="empty-message"><td colspan="5">Không có kết quả</td></tr>';
                return;
            }

            filteredStudents.forEach((student, index) => {
                const classification = getClassification(student.score);
                const row = document.createElement('tr');

                if (student.score < 5.0) {
                    row.classList.add('low-score');
                }

                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${student.name}</td>
                    <td>${student.score.toFixed(1)}</td>
                    <td>${classification}</td>
                    <td>
                        <button class="delete-btn" data-index="${index}">Xóa</button>
                    </td>
                `;

                tbody.appendChild(row);
            });
        }

        // ===== HÀM CẬP NHẬT THỐNG KÊ =====
        function updateStats() {
            // Thống kê dựa trên danh sách gốc (không phải filtered)
            totalStudentsSpan.textContent = students.length;

            if (students.length === 0) {
                avgScoreSpan.textContent = '0.00';
            } else {
                const totalScore = students.reduce((sum, student) => sum + student.score, 0);
                const avgScore = totalScore / students.length;
                avgScoreSpan.textContent = avgScore.toFixed(2);
            }
        }

        // ===== GẮN SỰ KIỆN =====

        // Bấm nút "Thêm"
        addBtn.addEventListener('click', addStudent);

        // Nhấn Enter ở ô Điểm
        scoreInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addStudent();
            }
        });

        // Tìm kiếm realtime
        searchInput.addEventListener('input', applyFilters);

        // Lọc theo xếp loại
        filterSelect.addEventListener('change', applyFilters);

        // Sắp xếp theo Điểm
        scoreHeader.addEventListener('click', () => {
            // Nếu đã sắp xếp theo score, thì đảo chiều
            if (sortConfig.field === 'score') {
                sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
            } else {
                // Nếu sắp xếp theo cột khác, chuyển sang score
                sortConfig.field = 'score';
                sortConfig.direction = 'asc';
            }

            applyFilters();
        });

        // Event Delegation: Xóa sinh viên
        tbody.addEventListener('click', (e) => {
            if (e.target.classList.contains('delete-btn')) {
                const index = parseInt(e.target.getAttribute('data-index'));
                deleteStudent(index);
            }
        });

        // Khởi tạo
        updateStats();
    </script>
</body>
</html>
